version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: neoshop_postgres
    restart: always
    environment:
      POSTGRES_USER: neoshop_admin
      POSTGRES_PASSWORD: neoshop_secure_password_2026
      POSTGRES_DB: neoshop_ultra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neoshop_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: neoshop_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@neoshop.com
      PGADMIN_DEFAULT_PASSWORD: admin_secure_password_2026
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - neoshop_network

volumes:
  postgres_data:
    driver: local

networks:
  neoshop_network:
    driver: bridge
